name: C++ MSBuild CI/CD with Unit Tests Only

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    # 1. Клонирование репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Инициализация MSBuild в PATH
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    # 2.5. Инициализация NuGet и восстановление пакетов (Google Test)
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: |
        nuget restore monitor.sln

    # 3. Сборка основного приложения (Release x64)
    - name: Build Application (Release x64)
      run: |
        msbuild monitor/monitor.vcxproj /p:Configuration=Release /p:Platform=x64 /p:RunCodeAnalysis=true

    # 4. Сборка тестовой DLL строго через 64-битный компилятор
    - name: Compile Tests DLL (x64)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl.exe /LD /EHsc /D_WINDLL /D_MBCS /DIS_TEST_BUILD /I"packages/Microsoft.googletest.v140.windesktop.msvcstl.static.rt-dyn.1.8.1.8\build\native\include" monitor.cpp monitor_ci_cd.cpp /link /OUT:monitor_tests.dll

    # 5. Запуск ТОЛЬКО юнит-тестов (фильтрация по категории Unit)
    - name: Run Unit Tests Only
      run: |
        vstest.console.exe monitor_tests.dll /Platform:x64 /TestCaseFilter:"TestCategory=Unit"

    # 6. Подготовка артефактов к публикации при успешных тестах
    - name: Prepare Artifacts
      shell: pwsh
      run: |
        mkdir output
        cp x64/Release/monitor.exe output/monitor.exe
        Compress-Archive -Path output/monitor.exe -DestinationPath output/monitor-windows-x64.zip

    # 7. Сохранение собранного бинарника в GitHub Actions
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: monitor-windows-x64-binary
        path: output/monitor.exe

    # 8. Публикация релиза на GitHub (только при создании тега v*)
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          output/monitor-windows-x64.zip
          output/monitor.exe
        body: |
          ### Системный монитор Windows (x64)
          * Изолированные Unit-тесты успешно пройдены.
          * Код проверен встроенным статическим анализатором MSVC.
          * Скомпилировано с оптимизацией скорости (`/O2`).
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
