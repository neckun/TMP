name: C++ MSBuild CI/CD with Unit Tests Only

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    # 1. Клонирование репозитория из GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Инициализация MSBuild в системе
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    # 3. Сборка всего решения (Все пакеты уже на месте в репозитории)
    - name: Build Solution (Release x64)
      run: |
        msbuild monitor.slnx /p:Configuration=Release /p:Platform=x64 /p:RunCodeAnalysis=true

    # 4. Запуск тестов Google Test напрямую из собранного бинарника
    - name: Run Google Tests
      run: |
        ./x64/Release/Test.exe

    # 5. Подготовка артефактов к публикации (сохраняем рабочую программу)
    - name: Prepare Artifacts
      shell: pwsh
      run: |
        mkdir output
        cp x64/Release/monitor.exe output/monitor.exe
        Compress-Archive -Path output/monitor.exe -DestinationPath output/monitor-windows-x64.zip

    # 6. Сохранение собранного бинарника в артефакты сборки GitHub
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: monitor-windows-x64-binary
        path: output/monitor.exe

    # 7. Создание официального GitHub релиза (только при создании тега версии v*)
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          output/monitor-windows-x64.zip
          output/monitor.exe
        body: |
          ### Системный монитор Windows (x64)
          * Изолированные Unit-тесты успешно пройдены.
          * Код проверен встроенным статическим анализатором MSVC.
          * Скомпилировано с оптимизацией скорости (`/O2`).
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
